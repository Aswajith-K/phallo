{% load static %}

<!DOCTYPE html>
<html>

<head>
    <link rel="icon" href="{% static 'store/images/favicon.ico' %}">

    <title>Collection</title>

    <!-- Bootstrap -->

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'store/css/collection.css' %}">
    <link rel="stylesheet" href="{% static 'store/css/includes/navbar.css' %}">
    <link rel="stylesheet" href="{% static 'store/css/includes/footer.css' %}">

</head>

<body>

    <!-- Navbar -->

    {% include 'store/includes/navbar.html' %}

    <!-- Page Navigation -->

    <div class="page-top-navi">
        <span class="page-navi">
            <a href="{% url 'home' %}">Home</a>
        </span>
        <span class="page-navi"> » Collection</span>
    </div>

    <!-- Page Title -->

    <div class="collection-header">

        <h1>
            Collection
        </h1>

    </div>

    <!-- Filter -->

    <div class="filter-div">
        <div class="filter-line"></div>

        <button class="filter-btn" id="filterToggle">
            <i class="bi bi-sliders2"></i>
            <p>FILTER</p>
        </button>

        <!-- Float Menu -->

        <div class="floating-menu" id="filterMenu">

            <label>
                <input type="checkbox" value="Anime" checked>
                Anime
            </label>

            <label>
                <input type="checkbox" value="Pokemon" checked>
                Pokemon
            </label>

            <label>
                <input type="checkbox" value="Hero" checked>
                Superhero
            </label>
        </div>

        <div class="filter-line"></div>
    </div>


    <!-- No Product Message -->

    <div class="no-products-message" id="noProductsMessage">

        <img src="{% static 'store/images/error_logo.svg' %}">

        <p>No products to display</p>

    </div>

    <!-- Products Grid -->

    <div class="collection-grid">

        {% for product in products %}

        <div class="product-card" data-category="{{ product.category }}">

            <div class="card border-0">

                <img src="{{ product.image.url }}" class="card-img-top product-img">

                <div class="card-body">

                    <h5 class="card-title">
                        {{ product.name }}
                    </h5>

                    <h6 class="card-cash">
                        ${{ product.price|floatformat:2 }}
                    </h6>

                    <a href="#" class="btn btn-dark w-100 mt-2">

                        Add to Cart

                    </a>

                </div>

            </div>

        </div>

        {% endfor %}

    </div>

    <!-- Footer -->

    {% include 'store/includes/footer.html' %}

    <!-- Bootstrap -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{% static 'store/js/collection.js' %}"></script>

</body>

</html>
